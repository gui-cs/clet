name: Release

# Versioning scheme:
#
#   main branch  → v1.0.0-alpha.1, v1.0.0-alpha.2, ...
#                   (base from csproj <Version>, build number auto-increments)
#
#   When alpha phase ends, change csproj <Version> to 1.0.0 (no suffix).
#   Then main produces: v1.0.0, v1.0.1, ... (patch auto-increment).
#
# Triggers:
#   1. Push to main that changes code
#   2. repository_dispatch from gui-cs/Terminal.Gui (any main-branch publish: rc, beta, stable)
#   3. Manual workflow_dispatch
on:
  push:
    branches: [main]
    paths: ['src/**', 'tests/**']
  repository_dispatch:
    types: [tg-main-published]
  workflow_dispatch:
    inputs:
      tg_version:
        description: 'Terminal.Gui version to build against. Leave empty for csproj default.'
        required: false
      version_override:
        description: 'Override clet version entirely. Leave empty for auto-computed.'
        required: false

permissions:
  contents: write
  issues: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      clet_version: ${{ steps.version.outputs.clet_version }}
      tg_version: ${{ steps.version.outputs.tg_version }}
      channel: ${{ steps.version.outputs.channel }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute version
        id: version
        shell: bash
        env:
          TG_VERSION_INPUT: ${{ github.event.client_payload.tg_version || github.event.inputs.tg_version }}
          VERSION_OVERRIDE: ${{ github.event.inputs.version_override }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # --- Validate user-supplied version inputs (prevent script injection) ---
          # Empty TG_VERSION_INPUT is allowed; the script falls back to the csproj pin below.
          VERSION_PATTERN='^[0-9A-Za-z._+*-]+$'
          if [ -n "$TG_VERSION_INPUT" ] && ! [[ "$TG_VERSION_INPUT" =~ $VERSION_PATTERN ]]; then
            echo "::error::tg_version input contains invalid characters: $TG_VERSION_INPUT"
            exit 2
          fi
          if [ -n "$VERSION_OVERRIDE" ] && ! [[ "$VERSION_OVERRIDE" =~ $VERSION_PATTERN ]]; then
            echo "::error::version_override input contains invalid characters: $VERSION_OVERRIDE"
            exit 2
          fi

          # --- Determine TG version ---
          TG_VERSION="$TG_VERSION_INPUT"

          # --- Channel is always main ---
          CHANNEL="main"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

          # --- Resolve TG version ---
          # Dispatch/manual: use the explicitly provided version.
          # Otherwise: use the csproj pin (known-good).
          if [ -z "$TG_VERSION" ]; then
            TG_VERSION=$(sed -n 's/.*<TerminalGuiVersion[^>]*>\([^<]*\)<.*/\1/p' src/Clet/Clet.csproj | head -1)
          fi
          echo "tg_version=$TG_VERSION" >> "$GITHUB_OUTPUT"

          # --- Determine clet version ---
          if [ -n "$VERSION_OVERRIDE" ]; then
            CLET_VERSION="$VERSION_OVERRIDE"
            echo "clet_version=$CLET_VERSION" >> "$GITHUB_OUTPUT"
            echo "## Version Resolution" >> "$GITHUB_STEP_SUMMARY"
            echo "- clet version: \`$CLET_VERSION\` (manual override)" >> "$GITHUB_STEP_SUMMARY"
            echo "- TG version: \`$TG_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- channel: \`$CHANNEL\`" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Read base version from csproj (e.g. "1.0.0-alpha" or "1.0.0")
          CSPROJ_VERSION=$(sed -n 's/.*<Version>\([^<]*\)<.*/\1/p' src/Clet/Clet.csproj | head -1)
          # Split into base (1.0.0) and prerelease phase (alpha, beta, rc, or empty)
          BASE_VERSION="${CSPROJ_VERSION%%-*}"
          if [[ "$CSPROJ_VERSION" == *-* ]]; then
            PHASE="${CSPROJ_VERSION#*-}"
          else
            PHASE=""
          fi

          MAJOR=$(echo "$BASE_VERSION" | cut -d. -f1)
          MINOR=$(echo "$BASE_VERSION" | cut -d. -f2)
          PATCH=$(echo "$BASE_VERSION" | cut -d. -f3)

          if [ -n "$PHASE" ]; then
            # Alpha/beta/rc phase: version is BASE-PHASE.N, auto-increment N
            # Find latest tag matching v1.0.0-alpha.*
            LATEST_TAG=$(git tag --list "v${BASE_VERSION}-${PHASE}.*" --sort=-v:refname | head -1)
            if [ -n "$LATEST_TAG" ]; then
              # Extract the build number (last dot-separated segment)
              BUILD_NUM=$(echo "$LATEST_TAG" | sed "s/.*${PHASE}\.//" | sed 's/-.*//')
              BUILD_NUM=$((BUILD_NUM + 1))
            else
              BUILD_NUM=1
            fi
            CLET_VERSION="${BASE_VERSION}-${PHASE}.${BUILD_NUM}"
          else
            # Stable phase: version is MAJOR.MINOR.PATCH, auto-increment patch
            LATEST_TAG=$(git tag --list "v${MAJOR}.${MINOR}.*" --sort=-v:refname | grep -v '-' | head -1)
            if [ -n "$LATEST_TAG" ]; then
              LATEST_PATCH=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f3)
              PATCH=$((LATEST_PATCH + 1))
            fi
            CLET_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "clet_version=$CLET_VERSION" >> "$GITHUB_OUTPUT"
          echo "## Version Resolution" >> "$GITHUB_STEP_SUMMARY"
          echo "- clet version: \`$CLET_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- TG version: \`$TG_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- channel: \`$CHANNEL\`" >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            runner: macos-14
          - rid: linux-x64
            runner: ubuntu-22.04
          - rid: win-x64
            runner: windows-2022
    runs-on: ${{ matrix.runner }}
    env:
      CLET_VERSION: ${{ needs.resolve-version.outputs.clet_version }}
      TG_VERSION: ${{ needs.resolve-version.outputs.tg_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore -p:TerminalGuiVersion=${{ env.TG_VERSION }}

      - name: Build
        run: dotnet build --no-restore -c Release -p:TerminalGuiVersion=${{ env.TG_VERSION }} -p:Version=${{ env.CLET_VERSION }}

      - name: Unit Tests
        shell: bash
        run: dotnet run --project tests/Clet.UnitTests --no-build -c Release

      - name: Integration Tests
        shell: bash
        run: dotnet run --project tests/Clet.IntegrationTests --no-build -c Release

      - name: Publish AOT
        run: >
          dotnet publish src/Clet -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishAot=true
          -p:TerminalGuiVersion=${{ env.TG_VERSION }}
          -p:Version=${{ env.CLET_VERSION }}
          -o publish/${{ matrix.rid }}

      - name: Smoke Tests
        shell: bash
        run: dotnet run --project tests/Clet.SmokeTests --no-build -c Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clet-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/
          retention-days: 30

  # Tag every successful build so future runs can find the latest build number.
  # Tags: v1.0.0-alpha.3, v1.0.0 (stable)
  tag:
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    env:
      CLET_VERSION: ${{ needs.resolve-version.outputs.clet_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create tag
        run: |
          if git rev-parse "v${CLET_VERSION}" >/dev/null 2>&1; then
            echo "Tag v${CLET_VERSION} already exists, skipping."
          else
            git tag "v${CLET_VERSION}"
            git push origin "v${CLET_VERSION}"
          fi

  # Create a GitHub Release with downloadable AOT binaries for each RID.
  # Prerelease (alpha/beta/rc) versions are flagged so they are not the
  # default download target.
  release:
    needs: [resolve-version, build, tag]
    runs-on: ubuntu-latest
    env:
      CLET_VERSION: ${{ needs.resolve-version.outputs.clet_version }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package release archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          package_unix() {
            local rid="$1"
            local src="artifacts/clet-${rid}"
            if [ ! -d "$src" ]; then
              echo "::warning::No artifact for ${rid}, skipping"
              return 0
            fi
            chmod +x "$src/clet" 2>/dev/null || true
            tar -czf "dist/clet-${CLET_VERSION}-${rid}.tar.gz" -C "$src" .
            echo "Created dist/clet-${CLET_VERSION}-${rid}.tar.gz"
          }

          package_windows() {
            local rid="$1"
            local src="artifacts/clet-${rid}"
            if [ ! -d "$src" ]; then
              echo "::warning::No artifact for ${rid}, skipping"
              return 0
            fi
            (cd "$src" && zip -r "../../dist/clet-${CLET_VERSION}-${rid}.zip" .)
            echo "Created dist/clet-${CLET_VERSION}-${rid}.zip"
          }

          package_unix   osx-arm64
          package_unix   linux-x64
          package_windows win-x64

          ls -la dist/

      - name: Create GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          PRERELEASE_FLAG=""
          if [[ "$CLET_VERSION" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          if gh release view "v${CLET_VERSION}" >/dev/null 2>&1; then
            echo "Release v${CLET_VERSION} already exists; uploading assets with --clobber."
            gh release upload "v${CLET_VERSION}" dist/* --clobber
          else
            gh release create "v${CLET_VERSION}" \
              --title "clet v${CLET_VERSION}" \
              --generate-notes \
              $PRERELEASE_FLAG \
              dist/*
          fi

  # NuGet publish runs on main only. Prerelease versions (alpha/beta/rc)
  # are hidden from default resolution; consumers opt in via --prerelease.
  publish-nuget:
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    env:
      CLET_VERSION: ${{ needs.resolve-version.outputs.clet_version }}
      TG_VERSION: ${{ needs.resolve-version.outputs.tg_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - name: Pack
        run: >
          dotnet pack src/Clet -c Release
          -p:TerminalGuiVersion=${{ env.TG_VERSION }}
          -p:Version=${{ env.CLET_VERSION }}
          -o packages/

      - name: Push to NuGet
        run: >
          dotnet nuget push packages/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  # Homebrew runs on stable main releases only (no prerelease suffix).
  publish-homebrew:
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    if: ${{ needs.resolve-version.outputs.channel == 'main' && !contains(needs.resolve-version.outputs.clet_version, '-') && vars.HOMEBREW_TAP_ENABLED == 'true' }}
    env:
      CLET_VERSION: ${{ needs.resolve-version.outputs.clet_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: gui-cs/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: clet-osx-*
          path: artifacts/

      - name: Generate formula
        run: |
          echo "# Homebrew formula generation placeholder"
          echo "# TODO: Generate clet.rb from template with version=${{ env.CLET_VERSION }}"
          echo "# For now, Homebrew ships as build-from-source (D-012)."

  # WinGet runs on stable main releases only.
  publish-winget:
    needs: [resolve-version, build]
    runs-on: windows-latest
    if: ${{ needs.resolve-version.outputs.channel == 'main' && !contains(needs.resolve-version.outputs.clet_version, '-') && vars.WINGET_ENABLED == 'true' }}
    env:
      CLET_VERSION: ${{ needs.resolve-version.outputs.clet_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate manifests (placeholder)
        run: |
          Write-Host "# WinGet manifest generation placeholder"
          Write-Host "# TODO: Generate from templates with version=${{ env.CLET_VERSION }}"
        shell: pwsh

  notify-failure:
    needs: [resolve-version, build, tag, release, publish-nuget, publish-homebrew, publish-winget]
    if: failure()
    runs-on: ubuntu-latest
    env:
      CLET_VERSION: ${{ needs.resolve-version.outputs.clet_version }}
      TG_VERSION: ${{ needs.resolve-version.outputs.tg_version }}
      CHANNEL: ${{ needs.resolve-version.outputs.channel }}
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release clet v${process.env.CLET_VERSION} failed (${process.env.CHANNEL})`,
              body: `The ${process.env.CHANNEL} release workflow for clet \`${process.env.CLET_VERSION}\` (TG \`${process.env.TG_VERSION}\`) failed.\n\nSee [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\nRefer to \`docs/runbooks/release-rollback.md\` for rollback procedures.`,
              labels: [`incident:${process.env.CHANNEL}`]
            });
