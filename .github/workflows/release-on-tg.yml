name: Release on TG

# Triggered by repository_dispatch from gui-cs/Terminal.Gui:
#   - tg-released:          on a TG release tag           → release channel (NuGet stable + Homebrew + WinGet)
#   - tg-develop-published: on a TG develop NuGet publish → develop channel (NuGet prerelease only)
# Channel is derived from the version string: contains '-' ⇒ develop, otherwise ⇒ release.
# See specs/decisions.md D-020 for rationale.
# Manual trigger (workflow_dispatch) is supported for rollback patches and dry-runs.
on:
  repository_dispatch:
    types: [tg-released, tg-develop-published]
  workflow_dispatch:
    inputs:
      tg_version:
        description: 'Terminal.Gui version (e.g. 2.1.0 for release, 2.0.2-develop.36 for develop)'
        required: true

permissions:
  contents: write
  issues: write

env:
  TG_VERSION: ${{ github.event.client_payload.tg_version || github.event.inputs.tg_version }}

jobs:
  build:
    # Develop channel skips osx-x64 — the macos-13 runner is slow and develop builds run frequently.
    # Release channel still produces all RIDs.
    if: ${{ matrix.rid != 'osx-x64' || !contains(github.event.client_payload.tg_version || github.event.inputs.tg_version, '-') }}
    strategy:
      # One bad RID shouldn't kill the others — surface all failures in one run.
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            runner: macos-14
          - rid: osx-x64
            runner: macos-13
          - rid: linux-x64
            runner: ubuntu-22.04
          - rid: win-x64
            runner: windows-2022
          # linux-arm64 and win-arm64 need GitHub's native ARM runners
          # (ubuntu-22.04-arm, windows-11-arm); cross-compile from x64 fails at
          # link time. Re-enable when wiring native ARM runners (tracked for v0.9 RC).
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore -p:TerminalGuiVersion=${{ env.TG_VERSION }}

      - name: Build
        run: dotnet build --no-restore -c Release -p:TerminalGuiVersion=${{ env.TG_VERSION }} -p:Version=${{ env.TG_VERSION }}

      - name: Unit Tests
        run: dotnet run --project tests/Clet.UnitTests --no-build -c Release

      - name: Integration Tests
        run: dotnet run --project tests/Clet.IntegrationTests --no-build -c Release

      - name: Publish AOT
        run: >
          dotnet publish src/Clet -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishAot=true
          -p:TerminalGuiVersion=${{ env.TG_VERSION }}
          -p:Version=${{ env.TG_VERSION }}
          -o publish/${{ matrix.rid }}

      - name: Smoke Tests
        run: dotnet run --project tests/Clet.SmokeTests --no-build -c Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clet-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/
          retention-days: 30

  # NuGet publish runs on BOTH channels. NuGet's prerelease semantics keep develop
  # builds off `latest` automatically; consumers opt in via `--prerelease`.
  publish-nuget:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Pack
        run: >
          dotnet pack src/Clet -c Release
          -p:TerminalGuiVersion=${{ env.TG_VERSION }}
          -p:Version=${{ env.TG_VERSION }}
          -o packages/

      - name: Push to NuGet
        run: >
          dotnet nuget push packages/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  # Homebrew runs on RELEASE channel only (no '-' in version).
  # Skipped on develop, and on release if HOMEBREW_TAP_ENABLED isn't set
  # (the formula step is still a placeholder; D-012).
  publish-homebrew:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.client_payload.tg_version || github.event.inputs.tg_version, '-') && vars.HOMEBREW_TAP_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: gui-cs/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: clet-osx-*
          path: artifacts/

      - name: Generate formula
        run: |
          echo "# Homebrew formula generation placeholder"
          echo "# TODO: Generate clet.rb from template with version=${{ env.TG_VERSION }}"
          echo "# and SHA256s from the downloaded artifacts."
          echo "# For now, Homebrew ships as build-from-source (D-012)."

  # WinGet runs on RELEASE channel only.
  publish-winget:
    needs: build
    runs-on: windows-latest
    if: ${{ !contains(github.event.client_payload.tg_version || github.event.inputs.tg_version, '-') && vars.WINGET_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate manifests (placeholder)
        run: |
          Write-Host "# WinGet manifest generation placeholder"
          Write-Host "# TODO: Generate from templates with version=${{ env.TG_VERSION }}"
        shell: pwsh

  notify-failure:
    needs: [build, publish-nuget, publish-homebrew, publish-winget]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        env:
          IS_DEVELOP: ${{ contains(github.event.client_payload.tg_version || github.event.inputs.tg_version, '-') }}
        with:
          script: |
            const isDevelop = process.env.IS_DEVELOP === 'true';
            const channel = isDevelop ? 'develop' : 'release';
            const label = isDevelop ? 'incident:develop' : 'incident:release';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release v${process.env.TG_VERSION} failed (${channel})`,
              body: `The ${channel} release workflow for TG version \`${process.env.TG_VERSION}\` failed.\n\nSee [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\nRefer to \`docs/runbooks/release-rollback.md\` for rollback procedures.`,
              labels: [label]
            });
